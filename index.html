<!DOCTYPE html>
<html lang="zh-Hant">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mori Salon POS</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div id="authBox">

    <h2>登入系統</h2>

    <input type="email" id="loginEmail" placeholder="Email">

    <input type="password" id="loginPassword" placeholder="密碼">

    <button class="login-btn" onclick="login()">
      登入
    </button>

  </div>

  <div class="container" id="posApp">

    <aside class="sidebar">

      <div class="logo">
        Mori POS
      </div>

      <div class="menu">

        <button>服務開單</button>

        <button>業績紀錄</button>

        <button>設計師報表</button>

      </div>

    </aside>

    <main class="main">

      <div class="top-bar">

        <div class="top-title">
          服務開單
        </div>

        <div class="sales-box" id="salesBox">
          今日營收：NT$0
        </div>

      </div>

      <div class="card">

        <h2>新增服務單</h2>

        <input type="number" id="orderNumber" placeholder="單號">

        <input type="text" id="customerName" placeholder="客人姓名">

        <input type="text" id="designerName" placeholder="設計師">

        <input type="text" id="serviceName" placeholder="服務項目">

        <input type="number" id="serviceAmount" placeholder="金額">

        <select id="paymentMethod">

          <option value="現金">現金</option>

          <option value="LinePay">LinePay</option>

          <option value="信用卡">信用卡</option>

        </select>

        <textarea id="serviceNote" placeholder="備註"></textarea>

        <button onclick="createServiceOrder()">
          建立服務單
        </button>

      </div>

      <div class="card">

        <h2>今日開單紀錄</h2>

        <div id="orderList"></div>

      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="app.js"></script>

</body>

</html>
